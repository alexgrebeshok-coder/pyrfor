    CronJobStatus:
      description: Status of a single registered cron job
      type: object
      required:
        - name
        - schedule
        - handler
        - enabled
        - nextRunAt
        - lastRunAt
        - lastError
        - successCount
        - failureCount
        - isRunning
      properties:
        name:
          type: string
          description: Unique job identifier
        schedule:
          type: string
          description: Croner-compatible cron expression
          example: "0 0 * * *"
        handler:
          type: string
          description: Registered handler name
        enabled:
          type: boolean
        timezone:
          type: [string, "null"]
          description: IANA timezone string, or absent/null for local time
        nextRunAt:
          type: [string, "null"]
          format: date-time
          description: ISO timestamp of next scheduled run; null when disabled
        lastRunAt:
          type: [string, "null"]
          format: date-time
          description: ISO timestamp of last successful run
        lastError:
          type: [string, "null"]
          description: Error message from the most recent failed run
        successCount:
          type: integer
          minimum: 0
        failureCount:
          type: integer
          minimum: 0
        isRunning:
          type: boolean
          description: True while the job handler is currently executing

    ChatMessage:
      description: A single chat message in the OpenAI message format
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          description: Message author role
          example: user
        content:
          type: string
          description: Message text content

    ChatCompletionRequest:
      description: Request body for `POST /v1/chat/completions`
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"
          description: >
            Conversation history. Only the **last** message's `content` is
            forwarded to the runtime; earlier entries provide context to the
            caller but are not replayed.
        channel:
          type: string
          default: api
          description: >
            Routing channel identifier (e.g. `telegram`, `slack`, `api`).
            Defaults to `"api"`.
        userId:
          type: string
          default: gateway-user
          description: User identifier for session lookup
        chatId:
          type: string
          default: gateway-chat
          description: Chat/conversation identifier for session lookup

    ChatCompletionChoice:
      type: object
      required: [index, message, finish_reason]
      properties:
        index:
          type: integer
          minimum: 0
        message:
          $ref: "#/components/schemas/ChatMessage"
        finish_reason:
          type: string
          enum: [stop]

