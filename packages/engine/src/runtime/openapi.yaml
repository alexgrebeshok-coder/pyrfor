openapi: 3.1.0

info:
  title: Pyrfor Runtime Gateway
  version: 0.1.0
  description: >
    Thin HTTP gateway that exposes health, status, cron, and OpenAI-compatible
    chat endpoints for the Pyrfor runtime. Auth is optional — when
    `gateway.bearerToken` is configured, all non-public routes require
    `Authorization: Bearer <token>`.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Pyrfor maintainers
    email: maintainers@example.com

servers:
  - url: http://127.0.0.1:18790
    description: >
      Default local address. Host and port are config-driven via
      `gateway.host` / `gateway.port` in runtime.json.

security:
  - bearerAuth: []

tags:
  - name: health
    description: Liveness and readiness probes
  - name: cron
    description: Cron job inspection and manual triggering
  - name: chat
    description: OpenAI-compatible chat completions
  - name: observability
    description: Runtime status and metrics
  - name: ide
    description: Desktop IDE workspace, filesystem, exec, PTY and git routes
  - name: trust
    description: Permission approval and audit routes
  - name: settings
    description: Runtime model and local-mode settings
  - name: orchestration
    description: Run, DAG, worker-frame and operator control-plane routes
  - name: memory
    description: Workspace memory snapshots and read-only session continuity routes

paths:

  /ping:
    get:
      summary: Liveness probe
      description: Returns `{"ok":true}` unconditionally. No authentication required.
      operationId: getPing
      tags: [health]
      security: []
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
              example:
                ok: true

  /health:
    get:
      summary: Health snapshot
      description: >
        Returns the last `HealthSnapshot` produced by `HealthMonitor.runChecks()`.
        Responds 503 when aggregate `status` is `unhealthy`; 200 for `healthy`
        or `degraded`. When no `HealthMonitor` is wired, returns
        `{"status":"unknown"}` with HTTP 200.
      operationId: getHealth
      tags: [health]
      security: []
      responses:
        "200":
          description: Health is healthy, degraded, or unknown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSnapshot"
              examples:
                healthy:
                  value:
                    status: healthy
                    timestamp: "2024-01-01T00:00:00.000Z"
                    uptimeMs: 3600000
                    restartCount: 0
                    checks: {}
                unknown:
                  value:
                    status: unknown
        "503":
          description: One or more critical checks are failing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSnapshot"
              example:
                status: unhealthy
                timestamp: "2024-01-01T00:00:00.000Z"
                uptimeMs: 120000
                restartCount: 1
                checks:
                  db:
                    name: db
                    healthy: false
                    critical: true
                    message: "connection refused"
                    consecutiveFailures: 3

  /metrics:
    get:
      summary: Prometheus metrics
      description: >
        Returns runtime metrics in Prometheus text exposition format (0.0.4).
        Includes uptime, health status, cron totals, and active session count.
        Public endpoint, no authentication required.
      operationId: getMetrics
      tags: [observability]
      security: []
      responses:
        "200":
          description: Prometheus metrics text
          content:
            text/plain; version=0.0.4:
              schema:
                type: string
              example: |
                # HELP pyrfor_runtime_uptime_seconds Runtime uptime in seconds
                # TYPE pyrfor_runtime_uptime_seconds gauge
                pyrfor_runtime_uptime_seconds 123.45

  /status:
    get:
      summary: Runtime status
      description: >
        Returns process uptime, trimmed gateway config, cron job list, and the
        last health snapshot. Requires authentication when
        `gateway.bearerToken` is configured.
      operationId: getStatus
      tags: [observability]
      responses:
        "200":
          description: Runtime status payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatus"
              example:
                uptime: 3661.42
                config:
                  gateway:
                    port: 18790
                    host: "127.0.0.1"
                cron:
                  - name: daily
                    schedule: "0 0 * * *"
                    handler: daily-report
                    enabled: true
                    timezone: null
                    nextRunAt: "2024-01-02T00:00:00.000Z"
                    lastRunAt: null
                    lastError: null
                    successCount: 0
                    failureCount: 0
                    isRunning: false
                health:
                  status: healthy
                  timestamp: "2024-01-01T00:05:00.000Z"
                  uptimeMs: 300000
                  restartCount: 0
                  checks: {}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /cron/jobs:
    get:
      summary: List cron jobs
      description: >
        Returns all registered cron jobs and their current status. When no
        `CronService` is wired the `jobs` array is empty.
      operationId: listCronJobs
      tags: [cron]
      responses:
        "200":
          description: Cron job list
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/CronJobStatus"
              example:
                jobs:
                  - name: daily
                    schedule: "0 0 * * *"
                    handler: daily-report
                    enabled: true
                    timezone: null
                    nextRunAt: "2024-01-02T00:00:00.000Z"
                    lastRunAt: null
                    lastError: null
                    successCount: 0
                    failureCount: 0
                    isRunning: false
        "401":
          $ref: "#/components/responses/Unauthorized"

  /cron/trigger:
    post:
      summary: Manually trigger a cron job
      description: >
        Runs the named cron job immediately, regardless of its schedule.
        Returns 400 if `name` is omitted, 503 if no `CronService` is wired,
        and 404 if the job name is not registered.
      operationId: triggerCronJob
      tags: [cron]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Registered job name
            example:
              name: daily
      responses:
        "200":
          description: Job triggered successfully
          content:
            application/json:
              schema:
                type: object
                required: [ok, name]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  name:
                    type: string
              example:
                ok: true
                name: daily
        "400":
          description: Missing required `name` field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: name required
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Job name not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: 'Job "weekly" not found'
        "503":
          description: CronService not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: CronService not available

  /v1/chat/completions:
    post:
      summary: Chat completions (OpenAI-compatible)
      description: >
        Sends a message to the Pyrfor runtime and returns an OpenAI-shaped
        `chat.completion` response. Only the last message's `content` is
        forwarded to `runtime.handleMessage(channel, userId, chatId, text)`.
        Defaults: `channel="api"`, `userId="gateway-user"`, `chatId="gateway-chat"`.
      operationId: createChatCompletion
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
            example:
              messages:
                - role: user
                  content: Hello, what can you do?
              channel: api
              userId: u-abc
              chatId: c-xyz
      responses:
        "200":
          description: OpenAI-shaped chat completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
              example:
                id: chatcmpl-1700000000000
                object: chat.completion
                created: 1700000000
                choices:
                  - index: 0
                    message:
                      role: assistant
                      content: I can help with many things!
                    finish_reason: stop
        "400":
          description: Empty or missing messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: messages must contain at least one entry with content
        "401":
          $ref: "#/components/responses/Unauthorized"
    options:
      summary: CORS preflight
      description: >
        Handles CORS preflight for `/v1/chat/completions`. The gateway responds
        to **all** `OPTIONS` requests (any path) with permissive CORS headers
        and 204 — no auth required.
      operationId: corsPreflightChat
      tags: [chat]
      security: []
      responses:
        "204":
          description: CORS preflight accepted
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Access-Control-Allow-Methods:
              schema:
                type: string
                example: GET, POST, OPTIONS
            Access-Control-Allow-Headers:
              schema:
                type: string
                example: Content-Type, Authorization

  /api/runtime/credentials:
    post:
      summary: Inject provider credentials
      description: Accepts Keychain-loaded provider secrets and refreshes the provider router.
      operationId: injectRuntimeCredentials
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialInjectionRequest"
            example:
              provider:openrouter: sk-or-...
      responses:
        "204":
          description: Credentials accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/workspace:
    get:
      summary: Get active workspace
      operationId: getWorkspace
      tags: [ide]
      responses:
        "200":
          description: Active runtime workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/workspace/open:
    post:
      summary: Open workspace
      operationId: openWorkspace
      tags: [ide]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Absolute existing directory path
      responses:
        "200":
          description: Workspace opened and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/fs/list:
    get:
      summary: List workspace directory
      operationId: listWorkspaceDirectory
      tags: [ide]
      parameters:
        - name: path
          in: query
          schema:
            type: string
            default: ""
      responses:
        "200":
          description: Directory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/fs/read:
    get:
      summary: Read workspace file
      operationId: readWorkspaceFile
      tags: [ide]
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FsReadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/fs/write:
    put:
      summary: Write workspace file
      operationId: writeWorkspaceFile
      tags: [ide]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, content]
              properties:
                path:
                  type: string
                content:
                  type: string
      responses:
        "200":
          description: Write accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/fs/search:
    post:
      summary: Search workspace files
      operationId: searchWorkspaceFiles
      tags: [ide]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                path:
                  type: string
                maxHits:
                  type: integer
      responses:
        "200":
          description: Search hits
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/chat:
    post:
      summary: Legacy IDE chat
      operationId: postIdeChat
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeChatRequest"
      responses:
        "200":
          description: Chat response
          content:
            application/json:
              schema:
                type: object
                required: [reply]
                properties:
                  reply:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/chat/stream:
    post:
      summary: Stream IDE chat events
      description: Returns Server-Sent Events; see docs/contracts/gateway-streaming.md.
      operationId: streamIdeChat
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeChatRequest"
      responses:
        "200":
          description: SSE stream of token/tool/final events
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/exec:
    post:
      summary: Execute command inside workspace
      operationId: executeWorkspaceCommand
      tags: [ide]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                cwd:
                  type: string
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/pty/spawn:
    post:
      summary: Spawn PTY session
      operationId: spawnPty
      tags: [ide]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                cwd:
                  type: string
                cols:
                  type: integer
                rows:
                  type: integer
      responses:
        "200":
          description: PTY session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtySession"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/pty/list:
    get:
      summary: List PTY sessions
      operationId: listPtySessions
      tags: [ide]
      responses:
        "200":
          description: PTY sessions
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/PtySession"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/git/status:
    get:
      summary: Git status for workspace
      operationId: getGitStatus
      tags: [ide]
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Git status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/settings/active-model:
    get:
      summary: Get active model hint
      operationId: getActiveModel
      tags: [settings]
      responses:
        "200":
          description: Active model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveModelResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Set active model hint
      operationId: setActiveModel
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, modelId]
              properties:
                provider:
                  type: string
                modelId:
                  type: string
      responses:
        "200":
          description: Active model updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveModelResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/approvals/pending:
    get:
      summary: List pending approval requests
      operationId: listPendingApprovals
      tags: [trust]
      responses:
        "200":
          description: Pending approval requests
          content:
            application/json:
              schema:
                type: object
                required: [approvals]
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/effects/pending:
    get:
      summary: List pending governed effects
      description: >
        Returns effect proposals that are still awaiting host approval or a
        terminal applied/denied/failed ledger event. The list is reconstructed
        from orchestration events so the operator console can hydrate pending
        side effects before subscribing to live updates.
      operationId: listPendingEffects
      tags: [trust, orchestration]
      responses:
        "200":
          description: Pending effect proposals
          content:
            application/json:
              schema:
                type: object
                required: [effects]
                properties:
                  effects:
                    type: array
                    items:
                      $ref: "#/components/schemas/PendingEffect"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/approvals/{id}/decision:
    post:
      summary: Approve or deny a pending request
      operationId: decideApproval
      tags: [trust]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, deny]
      responses:
        "200":
          description: Decision accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, decision]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  decision:
                    type: string
                    enum: [approve, deny]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/BadRequest"

  /api/audit/events:
    get:
      summary: List approval/tool and orchestration audit events
      operationId: listAuditEvents
      tags: [trust]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Audit events, newest first
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/events/stream:
    get:
      summary: Stream operator console events
      description: >
        Server-sent event stream for the IDE operator console. The first frame
        is a `snapshot` with dashboard, run, approval and pending-effect state;
        subsequent frames publish durable ledger updates and in-memory approval
        events. Clients should keep REST hydration as the source of truth and
        use the stream to refresh promptly.
      operationId: streamOperatorEvents
      tags: [orchestration, trust]
      responses:
        "200":
          description: Live operator event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/OperatorStreamEvent"
              examples:
                snapshot:
                  value: |
                    event: snapshot
                    data: {"dashboard":{"runs":{"total":1,"active":1,"blocked":0,"latest":[]},"dag":{"total":0,"ready":0,"running":0,"blocked":0},"effects":{"pending":0},"approvals":{"pending":0},"verifier":{"blocked":0},"workerFrames":{"total":0,"pending":0},"contextPack":null,"overlays":{"total":0,"domainIds":[]}},"runs":[],"approvals":[],"effects":[]}

        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/memory:
    get:
      summary: Get workspace memory snapshot
      operationId: getMemorySnapshot
      tags: [memory]
      responses:
        "200":
          description: Pyrfor-native workspace memory snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/memory/search:
    get:
      summary: Search durable Pyrfor memory for the current workspace
      description: >
        Searches durable, scope-filtered Pyrfor memory for the active workspace.
        Clients may optionally filter by projectId, but cannot override workspace
        or agent scope.
      operationId: searchMemory
      tags: [memory]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: projectId
          in: query
          required: false
          schema:
            type: string
          description: Optional project filter within the current workspace
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 0
            maximum: 50
      responses:
        "200":
          description: Durable memory search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySearchResponse"
        "400":
          description: Missing query or forbidden scope override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/memory/corrections:
    post:
      summary: Add an operator memory correction
      description: >
        Stores a durable operator-supplied correction in the current workspace,
        optionally scoped to a project. Clients cannot override workspace or
        agent scope.
      operationId: createMemoryCorrection
      tags: [memory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                summary:
                  type: string
                projectId:
                  type: string
                memoryType:
                  type: string
                  enum: [episodic, semantic, procedural, policy]
                  default: semantic
                importance:
                  type: number
                  minimum: 0
                  maximum: 1
                operatorId:
                  type: string
            example:
              content: "Prefer verifier-gated draft PR delivery for this project."
              summary: "Project delivery preference"
              projectId: "project-1"
      responses:
        "201":
          description: Durable memory correction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryCorrectionResponse"
        "400":
          description: Invalid content, memory type, JSON or forbidden scope override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/memory/rollup:
    post:
      summary: Create and promote a daily memory rollup
      description: >
        Summarizes current-workspace sessions and ledger activity for a day,
        stores the rollup as a summary artifact, and promotes it into Pyrfor
        semantic memory for future context retrieval.
      operationId: createMemoryRollup
      tags: [memory]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  format: date
                  description: Day to roll up. Defaults to today.
            example:
              date: "2026-01-01"
      responses:
        "201":
          description: Daily memory rollup created
          content:
            application/json:
              schema:
                type: object
                required: [rollup]
                properties:
                  rollup:
                    $ref: "#/components/schemas/DailyMemoryRollupResult"
        "400":
