components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Static bearer token configured via `gateway.bearerToken` in runtime.json.
        When the token is not configured, all auth checks are bypassed.

  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Unauthorized
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    HealthStatus:
      type: string
      enum: [healthy, degraded, unhealthy, unknown]
      description: Aggregate health status of the runtime

    HealthCheck:
      description: >
        Combined `HealthCheckResult` + `HealthCheckEntry` as stored in the
        snapshot's `checks` map. All `HealthCheckResult` fields are set after
        the check runs; `HealthCheckEntry` fields track historical state.
      type: object
      required: [name, healthy, critical, consecutiveFailures]
      properties:
        # HealthCheckEntry fields
        name:
          type: string
        critical:
          type: boolean
          description: If true, a failure drives aggregate status to `unhealthy`
        lastSuccessAt:
          type: [string, "null"]
          format: date-time
        lastFailureAt:
          type: [string, "null"]
          format: date-time
        consecutiveFailures:
          type: integer
          minimum: 0
        # HealthCheckResult fields
        healthy:
          type: boolean
        status:
          $ref: "#/components/schemas/HealthStatus"
        message:
          type: [string, "null"]
        metadata:
          type: [object, "null"]
          additionalProperties: true
        latencyMs:
          type: [number, "null"]
          description: How long the check took to execute (ms)

    HealthSnapshot:
      description: Point-in-time snapshot from `HealthMonitor.runChecks()`
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        timestamp:
          type: string
          format: date-time
        uptimeMs:
          type: number
          description: Process uptime in milliseconds at the time of the snapshot
        restartCount:
          type: integer
          minimum: 0
        checks:
          type: object
          description: >
            Map of check name → combined `HealthCheckResult & HealthCheckEntry`.
            Empty object when no checks are registered.
          additionalProperties:
            $ref: "#/components/schemas/HealthCheck"

    RuntimeStatus:
      description: Response payload for `GET /status`
      type: object
      required: [uptime, config]
      properties:
        uptime:
          type: number
          description: "`process.uptime()` value in seconds"
        config:
          type: object
          required: [gateway]
          properties:
            gateway:
              type: object
              required: [port, host]
              properties:
                port:
                  type: integer
                  example: 18790
                host:
                  type: string
                  example: "127.0.0.1"
        cron:
          description: "`CronService.getStatus()` output, or null if not wired"
          oneOf:
            - type: array
              items:
                $ref: "#/components/schemas/CronJobStatus"
            - type: "null"
        health:
          description: Last health snapshot, or null if not wired
          oneOf:
            - $ref: "#/components/schemas/HealthSnapshot"
            - type: "null"

    MemorySnapshot:
      type: object
      required: [lines, files, workspaceFiles, daily]
      properties:
        lines:
          type: array
          items:
            type: string
        files:
          type: array
          items:
            type: string
        workspaceFiles:
          type: object
          additionalProperties:
            type: object
            required: [present, lineCount]
            properties:
              present:
                type: boolean
              lineCount:
                type: integer
        daily:
          type: array
          items:
            type: object
            required: [date, lineCount, lines]
            properties:
              date:
                type: string
              lineCount:
                type: integer
              lines:
                type: array
                items:
                  type: string

    DailyMemoryRollupResult:
      type: object
      required: [date, workspaceId, agentId, sessionCount, messageCount, ledgerEventCount, runIds, summary, content]
      properties:
        date:
          type: string
          format: date
        workspaceId:
          type: string
        agentId:
          type: string
        sessionCount:
          type: integer
        messageCount:
          type: integer
        ledgerEventCount:
          type: integer
        runIds:
          type: array
          items:
            type: string
        summary:
          type: string
        content:
          type: string
        artifact:
          nullable: true
          $ref: "#/components/schemas/ArtifactRecord"
        memoryId:
          type: string

    MemorySearchResponse:
      type: object
      required: [workspaceId, query, results]
      properties:
        workspaceId:
          type: string
        query:
          type: string
        projectId:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/MemorySearchHit"

    MemorySearchHit:
      type: object
      required: [id, content, createdAt, memoryType, importance, source]
      properties:
        id:
          type: string
        summary:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        memoryType:
          type: string
          enum: [episodic, semantic, procedural, policy]
        importance:
          type: number
        workspaceId:
          type: string
        projectId:
          type: string
        source:
          type: string
          enum: [durable]
        scopeVisibility:
          type: string
        rollupKind:
          type: string
        projectMemoryCategory:
          type: string

    MemoryCorrectionResponse:
      type: object
      required: [memory]
      properties:
        memory:
          $ref: "#/components/schemas/MemorySearchHit"

    RuntimeSessionSummary:
      type: object
      required: [id, workspaceId, title, mode, createdAt, updatedAt, messageCount]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        title:
          type: string
        mode:
          type: string
          enum: [chat, edit, autonomous, pm]
        runId:
          type: string
        parentSessionId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messageCount:
          type: integer
        summary:
          type: string
        archived:
          type: boolean

    RuntimeSessionMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string
        name:
          type: string
        toolCallId:
          type: string
        toolCalls:
          type: array
          items:
