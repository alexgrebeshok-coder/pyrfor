          type: string
          description: "`chatcmpl-<timestamp>` identifier"
          example: chatcmpl-1700000000000
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix timestamp (seconds) at response creation
          example: 1700000000
        choices:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/ChatCompletionChoice"

