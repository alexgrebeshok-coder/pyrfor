version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "eslint"
        versions: ["8.x"]
      - dependency-name: "typescript"
        versions: ["5.x"]
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/lib"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
