name: Feature request
description: Propose a new capability or improvement
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Likely touch areas
      options:
        - label: Engine runtime
        - label: CLI
        - label: IDE
        - label: Docs / DX
        - label: Blocks / integrations
