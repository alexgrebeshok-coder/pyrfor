name: CEOClaw Performance Budget

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}
  NEXTAUTH_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  CEOCLAW_E2E_AUTH_BYPASS: "true"
  CEOCLAW_SKIP_AUTH: "true"
  DASHBOARD_API_KEY: ci-dashboard-key

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ceoclaw_perf
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ceoclaw_perf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ceoclaw_perf?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/ceoclaw_perf?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Print performance budget summary
        run: npm run check:performance

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Build application
        run: npm run build

      - name: Run Lighthouse CI baseline
        run: npm run perf:lighthouse
        continue-on-error: true

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci-report-${{ github.run_id }}
          path: .lighthouseci
          if-no-files-found: ignore
