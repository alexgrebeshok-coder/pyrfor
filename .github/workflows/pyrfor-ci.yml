name: Pyrfor IDE — CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/pyrfor-ide/**'
      - 'packages/engine/**'
      - '.github/workflows/pyrfor-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/pyrfor-ide/**'
      - 'packages/engine/**'
      - '.github/workflows/pyrfor-ci.yml'
  workflow_dispatch:

jobs:
  ci:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/pyrfor-ide/src-tauri

      # ── Install deps ──────────────────────────────────────────────────────
      - name: pnpm install (root)
        run: pnpm install --frozen-lockfile

      - name: npm ci (web)
        run: npm ci
        working-directory: apps/pyrfor-ide/web

      # ── Engine ───────────────────────────────────────────────────────────
      - name: Build engine
        run: pnpm --filter @pyrfor/engine build

      - name: Test engine
        run: pnpm --filter @pyrfor/engine test

      # ── Web ──────────────────────────────────────────────────────────────
      - name: Test web
        run: npm test -- --run
        working-directory: apps/pyrfor-ide/web

      - name: Build web
        run: npm run build
        working-directory: apps/pyrfor-ide/web

      # ── Rust (no full bundle, just type-check) ────────────────────────────
      - name: Create sidecar stub dirs (tauri_build resource gate)
        run: |
          mkdir -p apps/pyrfor-ide/src-tauri/binaries/_runtime
          mkdir -p apps/pyrfor-ide/src-tauri/binaries/_app

      - name: cargo check
        run: cargo check
        working-directory: apps/pyrfor-ide/src-tauri
