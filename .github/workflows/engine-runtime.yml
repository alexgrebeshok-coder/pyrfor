name: Engine Runtime CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/engine/**'
      - '.github/workflows/engine-runtime.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/engine/**'
      - '.github/workflows/engine-runtime.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: '10.30.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm --filter @ceoclaw/engine typecheck

  test:
    name: Test (Runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: '10.30.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run runtime tests
        run: pnpm --filter @ceoclaw/engine test -- packages/engine/src/runtime/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/engine/coverage/
          if-no-files-found: ignore

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/engine/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck packages/engine/scripts/*.sh
