name: Pyrfor IDE — Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      allow_unsigned:
        description: Allow macOS build without Apple code signing (unsigned DMG)
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14   # Apple Silicon (arm64)
    timeout-minutes: 60
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
      RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      # ── Node.js 22 ──────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ── Rust stable ─────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/pyrfor-ide/src-tauri

      # ── Install Tauri CLI ────────────────────────────────────────────────────
      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2" --locked

      # ── Install JS deps ──────────────────────────────────────────────────────
      - name: pnpm install (root)
        run: pnpm install --frozen-lockfile

      - name: npm ci (web)
        run: npm ci
        working-directory: apps/pyrfor-ide/web

      # ── Release gates ────────────────────────────────────────────────────────
      - name: Require Apple signing for tag releases
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.allow_unsigned != 'true')
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::error::APPLE_SIGNING_IDENTITY is required for tagged releases. Use workflow_dispatch with allow_unsigned=true only for dry runs."
            exit 1
          fi
          for var in APPLE_CERTIFICATE_P12 APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_TEAM_ID APPLE_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::$var must be set for notarized macOS releases."
              exit 1
            fi
          done

      - name: Require updater signing secret for tagged releases
        if: github.event_name == 'push'
        run: test -n "$TAURI_SIGNING_PRIVATE_KEY"

      # ── Engine tests ─────────────────────────────────────────────────────────
      - name: Build + test engine
        run: |
          pnpm --filter @pyrfor/engine build
          pnpm --filter @pyrfor/engine test

      - name: Pyrfor readiness gate
        run: pnpm qa:first-run -- --no-build

      # ── Web tests + build ────────────────────────────────────────────────────
      - name: Test + build web
        run: |
          npm test -- --run
          npm run build
        working-directory: apps/pyrfor-ide/web

      # ── Build sidecar binary ─────────────────────────────────────────────────
      - name: Build sidecar
        run: npm run build:sidecar
        working-directory: apps/pyrfor-ide

      - name: Verify release sidecar contract
        run: pnpm release:check

      # ── Apple code signing setup ─────────────────────────────────────────────
      - name: Import Apple Developer certificate
        if: env.APPLE_SIGNING_IDENTITY != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ env.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ env.APPLE_CERTIFICATE_PASSWORD }}

      # ── Tauri build ──────────────────────────────────────────────────────────
      - name: Build Pyrfor.app / DMG / updater bundle
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::warning::APPLE_SIGNING_IDENTITY not set — building UNSIGNED artifacts."
            unset APPLE_SIGNING_IDENTITY
            unset APPLE_CERTIFICATE_P12
            unset APPLE_CERTIFICATE_PASSWORD
            unset APPLE_ID
            unset APPLE_TEAM_ID
            unset APPLE_PASSWORD
          fi
          cargo tauri build --bundles dmg,app,updater
        working-directory: apps/pyrfor-ide/src-tauri

      - name: Verify Tauri updater signatures
        if: github.event_name == 'push'
        working-directory: apps/pyrfor-ide/src-tauri
        run: |
          set -euo pipefail
          PUBKEY=$(node -e "const c=require('./tauri.conf.json'); console.log(c.plugins.updater.pubkey)")
          shopt -s nullglob
          SIGS=(target/release/bundle/macos/*.app.tar.gz.sig)
          if [ ${#SIGS[@]} -eq 0 ]; then
            echo "::error::No updater .sig files found"
            exit 1
          fi
          for sig in "${SIGS[@]}"; do
            bundle="${sig%.sig}"
            echo "Verifying $sig"
            cargo tauri signer verify -p "$PUBKEY" "$bundle" -s "$sig"
          done

      - name: Notarize and staple (insurance)
        if: env.APPLE_SIGNING_IDENTITY != ''
        env:
          ALLOW_UNSIGNED: ${{ github.event.inputs.allow_unsigned }}
        run: |
          set -euo pipefail
          DMG=(apps/pyrfor-ide/src-tauri/target/release/bundle/dmg/*.dmg)
          APP=(apps/pyrfor-ide/src-tauri/target/release/bundle/macos/*.app)
          if [ ${#DMG[@]} -eq 0 ]; then
            echo "::error::No DMG artifact found"
            exit 1
          fi
          DMG_PATH="${DMG[0]}"
          echo "Submitting $DMG_PATH to notarytool"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          if [ ${#APP[@]} -gt 0 ]; then
            xcrun stapler staple "${APP[0]}"
          fi
          xcrun stapler staple "$DMG_PATH"
          spctl -a -vv -t install "$DMG_PATH" || spctl -a -vv "${APP[0]}"
          codesign -dv --verbose=4 "${APP[0]}" 2>&1 | head -20

      # ── Generate latest.json manifest ────────────────────────────────────────
      - name: Generate latest.json
        run: bash scripts/build-latest-json.sh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Generate SHA256SUMS
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          cd apps/pyrfor-ide/src-tauri/target/release/bundle
          {
            shopt -s nullglob
            for f in dmg/*.dmg macos/*.app.tar.gz macos/*.app.tar.gz.sig; do
              [ -f "$f" ] && shasum -a 256 "$f"
            done
          } > "$GITHUB_WORKSPACE/SHA256SUMS"
          shasum -a 256 "$GITHUB_WORKSPACE/latest.json" >> "$GITHUB_WORKSPACE/SHA256SUMS"

      - name: GPG-sign release assets
        if: env.RELEASE_GPG_PRIVATE_KEY != ''
        run: |
          set -euo pipefail
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          echo "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          if [ -n "$RELEASE_GPG_PASSPHRASE" ]; then
            echo "$RELEASE_GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 --list-secret-keys >/dev/null
          fi
          sign_file() {
            local f="$1"
            if [ -n "$RELEASE_GPG_PASSPHRASE" ]; then
              echo "$RELEASE_GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign --armor "$f"
            else
              gpg --batch --yes --detach-sign --armor "$f"
            fi
          }
          shopt -s nullglob
          for f in apps/pyrfor-ide/src-tauri/target/release/bundle/dmg/*.dmg \
                   apps/pyrfor-ide/src-tauri/target/release/bundle/macos/*.app.tar.gz \
                   latest.json SHA256SUMS; do
            [ -f "$f" ] && sign_file "$f"
          done

      - name: Note missing GPG signing secrets
        if: env.RELEASE_GPG_PRIVATE_KEY == '' && github.event_name == 'push'
        run: |
          echo "::notice::Optional: set RELEASE_GPG_PRIVATE_KEY and RELEASE_GPG_PASSPHRASE to publish .asc signatures on GitHub Releases."

      # ── Upload Release artifacts ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/pyrfor-ide/src-tauri/target/release/bundle/dmg/*.dmg
            apps/pyrfor-ide/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/pyrfor-ide/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            latest.json
            SHA256SUMS
            *.asc
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
