name: CEOClaw CI/CD

on:
  push:
    branches: [main, codex/launch-sync]
  pull_request:
    branches: [main, codex/launch-sync]

env:
  SKIP_E2E: ${{ vars.SKIP_E2E || 'true' }}
  SKIP_E2E_REASON: ${{ vars.SKIP_E2E_REASON || 'Playwright e2e is temporarily disabled in CI until flaky coverage and test fixtures are stabilized.' }}

jobs:
  # Job 1: Lint & Type Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Prepare Prisma for production schema
        run: npm run prisma:prepare:production
      - name: Run ESLint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit

  # Job 2: Unit Tests
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Prepare Prisma for production schema
        run: npm run prisma:prepare:production
      - name: Run unit tests
        run: npm run test -- --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 3: Build
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Prepare Prisma for production schema
        run: npm run prisma:prepare:production
      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          include-hidden-files: true
          path: .next

  # Job 4: E2E Tests (smoke first, accessibility optional)
  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Prepare Prisma for production schema
        run: npm run prisma:prepare:production
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .next
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run E2E smoke checks
        run: npm run test:e2e:smoke
        env:
          CEOCLAW_SKIP_AUTH: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      - name: Run accessibility tests
        if: ${{ env.SKIP_E2E != 'true' && vars.RUN_ACCESSIBILITY_E2E == 'true' }}
        run: npm run test:e2e:accessibility
        env:
          CEOCLAW_SKIP_AUTH: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}

  # Job 5: Deploy (only main branch)
  deploy:
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .next
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
