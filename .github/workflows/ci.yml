name: CEOClaw CI/CD

on:
  push:
    branches: [main, codex/launch-sync]
  pull_request:
    branches: [main, codex/launch-sync]
  workflow_dispatch:

env:
  SKIP_E2E: ${{ vars.SKIP_E2E || 'false' }}
  SKIP_E2E_REASON: ${{ vars.SKIP_E2E_REASON || 'Playwright e2e is explicitly disabled for this workflow run.' }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}
  NEXTAUTH_URL: http://127.0.0.1:3000
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  # Job 1: Lint, Type Check & Security Audit
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm audit --production --audit-level=critical || echo "::warning::npm audit found high-severity issues (see above)"
      - name: Run ESLint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit

  # Job 2: Unit Tests
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 3: Build
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build

  # Job 4: E2E Tests (smoke first, accessibility optional)
  e2e:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ceoclaw_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ceoclaw_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ceoclaw_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/ceoclaw_ci?schema=public
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-nextauth-secret' }}
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      CEOCLAW_E2E_AUTH_BYPASS: "true"
      CEOCLAW_SKIP_AUTH: "true"
      DASHBOARD_API_KEY: ci-dashboard-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
      - name: Build application for smoke tests
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests (Tier 1 — must pass)
        run: E2E_TIER=1 npm run ci:e2e
      - name: Run E2E feature tests (Tier 2 — best effort)
        run: E2E_TIER=2 npm run ci:e2e || echo "::warning::Some Tier 2 E2E tests failed (non-blocking)"

  # Job 5: Deploy (only main branch)
  deploy:
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip deploy when Vercel secrets are missing
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}
        run: echo "Skipping deploy because Vercel secrets are not configured in GitHub Actions."
      - name: Deploy to Vercel
        id: deploy
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ env.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
      - name: Run post-deploy smoke checks
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        env:
          BASE_URL: ${{ steps.deploy.outputs['preview-url'] }}
        run: npm run smoke:postdeploy
