name: Workspace Packages CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'tsconfig.base.json'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'tsconfig.base.json'
      - 'pnpm-workspace.yaml'

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  # ─── Workspace: TypeCheck all packages ─────────────────────
  workspace-typecheck:
    name: Typecheck (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [engine, business, ochag, freeclaude, ui]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install workspace dependencies
        run: pnpm install --ignore-scripts
      - name: Typecheck @${{ matrix.package }}
        run: pnpm --filter "@*/${{ matrix.package }}" typecheck || pnpm --filter "@ceoclaw/${{ matrix.package }}" typecheck

  # ─── Boundary violations check ─────────────────────────────
  eslint-boundaries:
    name: ESLint Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Check package boundaries
        run: npx eslint packages/ --ext .ts,.tsx --rule 'boundaries/element-types: error' || echo "::warning::Boundary violations detected (see above)"

  # ─── Monolith tests still pass ─────────────────────────────
  monolith-tests:
    name: Monolith Tests (regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Unit tests
        run: npm run test:run
        env:
          DATABASE_URL: "postgresql://localhost:5432/test"
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000

  # ─── Prisma merge tool check ────────────────────────────────
  prisma-merge-check:
    name: Prisma Merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Run prisma-merge
        run: npx ts-node tools/prisma-merge/index.ts
      - name: Verify merged.prisma was generated
        run: test -f prisma/merged.prisma && echo "✅ merged.prisma exists"
