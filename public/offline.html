<!DOCTYPE html>
<html>
<head>
  <title>CEOClaw - Limited offline shell</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body { 
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.24), transparent 38%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: #e2e8f0;
      padding: 24px;
    }

    .card {
      max-width: 28rem;
      width: 100%;
      padding: 28px 22px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 20px 60px rgba(2, 6, 23, 0.38);
      text-align: center;
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 5vw, 2rem);
    }

    p {
      margin: 0;
      line-height: 1.55;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>📡 Оффлайн shell</h1>
    <p>Проверьте подключение к интернету. Уже загруженные экраны могут открыться из кэша, но новые переходы и свежие данные требуют сети.</p>
  </main>
</body>
</html>
